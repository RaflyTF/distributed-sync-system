version: "3.9"

networks:
  distributed_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis_data:

services:
  # ── Redis (Distributed State Storage) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      distributed_net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Node 1 (Seed / Initial Leader Candidate) ────────────────────────────────
  node1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    container_name: node1
    environment:
      NODE_ID: node1
      NODE_HOST: 0.0.0.0
      NODE_PORT: 8001
      PEERS: http://node2:8002,http://node3:8003
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RAFT_ELECTION_TIMEOUT_MIN: 150
      RAFT_ELECTION_TIMEOUT_MAX: 300
      RAFT_HEARTBEAT_INTERVAL: 50
      CACHE_MAX_SIZE: 500
      SECRET_KEY: distributed-system-secret-key-2024
      LOG_LEVEL: INFO
      METRICS_PORT: 9091
    ports:
      - "8001:8001"
      - "9091:9091"
    command: python -m uvicorn app:app --host 0.0.0.0 --port 8001
    depends_on:
      redis:
        condition: service_healthy
    networks:
      distributed_net:
        ipv4_address: 172.20.0.11
    restart: unless-stopped

  # ── Node 2 ──────────────────────────────────────────────────────────────────
  node2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    container_name: node2
    environment:
      NODE_ID: node2
      NODE_HOST: 0.0.0.0
      NODE_PORT: 8002
      PEERS: http://node1:8001,http://node3:8003
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RAFT_ELECTION_TIMEOUT_MIN: 150
      RAFT_ELECTION_TIMEOUT_MAX: 300
      RAFT_HEARTBEAT_INTERVAL: 50
      CACHE_MAX_SIZE: 500
      SECRET_KEY: distributed-system-secret-key-2024
      LOG_LEVEL: INFO
      METRICS_PORT: 9092
    ports:
      - "8002:8002"
      - "9092:9092"
    command: python -m uvicorn app:app --host 0.0.0.0 --port 8002
    depends_on:
      redis:
        condition: service_healthy
    networks:
      distributed_net:
        ipv4_address: 172.20.0.12
    restart: unless-stopped

  # ── Node 3 ──────────────────────────────────────────────────────────────────
  node3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    container_name: node3
    environment:
      NODE_ID: node3
      NODE_HOST: 0.0.0.0
      NODE_PORT: 8003
      PEERS: http://node1:8001,http://node2:8002
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RAFT_ELECTION_TIMEOUT_MIN: 150
      RAFT_ELECTION_TIMEOUT_MAX: 300
      RAFT_HEARTBEAT_INTERVAL: 50
      CACHE_MAX_SIZE: 500
      SECRET_KEY: distributed-system-secret-key-2024
      LOG_LEVEL: INFO
      METRICS_PORT: 9093
    ports:
      - "8003:8003"
      - "9093:9093"
    command: python -m uvicorn app:app --host 0.0.0.0 --port 8003
    depends_on:
      redis:
        condition: service_healthy
    networks:
      distributed_net:
        ipv4_address: 172.20.0.13
    restart: unless-stopped

  # ── Prometheus (Monitoring) ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      distributed_net:
        ipv4_address: 172.20.0.20
    profiles:
      - monitoring

  # ── Grafana (Visualization) ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    networks:
      distributed_net:
        ipv4_address: 172.20.0.21
    profiles:
      - monitoring
    depends_on:
      - prometheus

  # ── Node 4 (Opsional - untuk demo dynamic scaling) ──────────────────────────
  # Jalankan dengan: docker compose --profile scale up -d node4
  node4:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    container_name: node4
    profiles:
      - scale
    environment:
      NODE_ID: node4
      NODE_HOST: 0.0.0.0
      NODE_PORT: 8004
      PEERS: http://node1:8001,http://node2:8002,http://node3:8003
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RAFT_ELECTION_TIMEOUT_MIN: 150
      RAFT_ELECTION_TIMEOUT_MAX: 300
      RAFT_HEARTBEAT_INTERVAL: 50
      CACHE_MAX_SIZE: 500
      SECRET_KEY: distributed-system-secret-key-2024
      LOG_LEVEL: INFO
      METRICS_PORT: 9094
    ports:
      - "8004:8004"
      - "9094:9094"
    command: python -m uvicorn app:app --host 0.0.0.0 --port 8004
    depends_on:
      redis:
        condition: service_healthy
    networks:
      distributed_net:
        ipv4_address: 172.20.0.14
    restart: unless-stopped
