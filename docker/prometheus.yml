global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'distributed-sync-node1'
    static_configs:
      - targets: ['node1:9091']
    metrics_path: /metrics

  - job_name: 'distributed-sync-node2'
    static_configs:
      - targets: ['node2:9092']
    metrics_path: /metrics

  - job_name: 'distributed-sync-node3'
    static_configs:
      - targets: ['node3:9093']
    metrics_path: /metrics

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
